<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if title %}{{ title }} · ПрофДНК{% else %}ПрофДНК{% endif %}</title>
  <script>
    (function () {
      let savedTheme = null;
      try {
        savedTheme = localStorage.getItem("profdnk_theme");
      } catch (error) {
        savedTheme = null;
      }
      const theme = savedTheme === "light" || savedTheme === "dark" ? savedTheme : "dark";
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <header class="topbar">
    <a class="brand" href="/">TITANIT · ПрофДНК</a>
    <nav class="topnav">
      <a href="/features">Возможности</a>
      {% if user %}
        {% if user.role.value == "admin" %}
          <a href="/admin">Админ</a>
        {% else %}
          <a href="/dashboard">Кабинет</a>
          <a href="/tests">Опросники</a>
          <a href="/tests/new">Конструктор</a>
        {% endif %}
      {% endif %}
    </nav>
    <div class="topbar-actions">
      <button id="theme-toggle" class="btn ghost theme-toggle" type="button">Тема: тёмная</button>
      {% if user %}
        <form action="/logout" method="post">
          <button class="btn ghost" type="submit">Выйти</button>
        </form>
      {% else %}
        <a class="btn ghost" href="/login">Войти</a>
      {% endif %}
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
    (function () {
      const toggle = document.getElementById("theme-toggle");
      if (!toggle) {
        return;
      }

      function currentTheme() {
        return document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark";
      }

      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        try {
          localStorage.setItem("profdnk_theme", theme);
        } catch (error) {
          // Ничего не делаем, если хранилище недоступно.
        }
        toggle.textContent = theme === "light" ? "Тема: светлая" : "Тема: тёмная";
      }

      setTheme(currentTheme());
      toggle.addEventListener("click", function () {
        const nextTheme = currentTheme() === "dark" ? "light" : "dark";
        setTheme(nextTheme);
      });
    })();
  </script>
</body>
</html>
