{% extends "base.html" %}
{% block content %}
<section class="center-wrap">
  <article class="panel login-panel">
    <h1>Вход в систему</h1>
    <p class="muted">Платформа ПрофДНК: вход для администратора и психолога.</p>

    <details class="collapse-panel">
      <summary>Демо-доступы</summary>
      <p><code>admin@profdnk.local / admin123</code></p>
      <p><code>psychologist@demo.local / demo12345</code></p>
    </details>

    {% if error %}
      <div class="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="form-grid">
      {{ csrf_input(request) }}
      <label>
        E-mail
        <input type="email" name="email" required autocomplete="username">
      </label>
      <label>
        Пароль
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <button class="btn" type="submit">Войти</button>
    </form>
  </article>
</section>
{% endblock %}
