services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: profdnk
      POSTGRES_USER: profdnk
      POSTGRES_PASSWORD: profdnk
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profdnk"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_SECRET_KEY: super-secret-change-me
      DATABASE_URL: postgresql+psycopg2://profdnk:profdnk@db:5432/profdnk
      BASE_URL: http://localhost:8000
      AUTO_SEED: "true"
      AUTO_CREATE_SCHEMA: "true"
      LOG_LEVEL: "INFO"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  pg_data:
