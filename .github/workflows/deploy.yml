name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SMOKE_BASE_URL: https://recallio.tech
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            APP_DIR=/srv/titanit-profdnk-mvp
            REPO_URL="https://x-access-token:${{ secrets.DEPLOY_GH_TOKEN }}@github.com/kleget/titanit-profdnk-mvp.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              GIT_TERMINAL_PROMPT=0 git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL"
            GIT_TERMINAL_PROMPT=0 git fetch origin
            git checkout main
            git reset --hard origin/main
            git remote set-url origin https://github.com/kleget/titanit-profdnk-mvp.git

            python3 -m venv .venv
            .venv/bin/pip install --upgrade pip
            .venv/bin/pip install -r backend/requirements.txt

            cat > "$APP_DIR/.env.deploy" <<EOF
            APP_SECRET_KEY=${{ secrets.APP_SECRET_KEY }}
            DATABASE_URL=sqlite+pysqlite:////srv/titanit-profdnk-mvp/profdnk.db
            BASE_URL=https://recallio.tech
            AUTO_SEED=true
            SMTP_ENABLED=true
            SMTP_HOST=smtp.gmail.com
            SMTP_PORT=587
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            SMTP_TLS=true
            EOF

            set -a
            . "$APP_DIR/.env.deploy"
            set +a
            (cd "$APP_DIR/backend" && ../.venv/bin/alembic upgrade head)

            # Keep hackathon app as primary service on 8000.
            for svc in recallio-web recallio-api recallio-jobs; do
              if systemctl list-unit-files | grep -q "^${svc}.service"; then
                systemctl stop "$svc" || true
                systemctl disable "$svc" || true
              fi
            done

            systemctl daemon-reload
            systemctl restart titanit-profdnk.service
            nginx -t
            systemctl reload nginx

            # Wait for app health instead of single immediate check.
            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:8000/api/health >/dev/null; then
                break
              fi
              sleep 1
            done
            curl -fsS http://127.0.0.1:8000/api/health

      - name: Smoke test after deploy (public URL)
        run: |
          set -euo pipefail

          HEALTH_PAYLOAD="$(curl -fsS "$SMOKE_BASE_URL/api/health")"
          echo "Health payload: $HEALTH_PAYLOAD"

          HEALTH_PAYLOAD="$HEALTH_PAYLOAD" python - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["HEALTH_PAYLOAD"])
          status = payload.get("status")
          if status != "ok":
              raise SystemExit(f"Smoke failed: unexpected status={status!r}")
          PY

          LOGIN_STATUS="$(curl -sS -o /dev/null -w "%{http_code}" "$SMOKE_BASE_URL/login")"
          if [ "$LOGIN_STATUS" -ne 200 ]; then
            echo "Smoke failed: expected /login HTTP 200, got $LOGIN_STATUS"
            exit 1
          fi
